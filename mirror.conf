# ==============================================================================
# Local mirror configuration — point everything at YOUR server, never a CDN.
# ------------------------------------------------------------------------------
# Set BT_MIRROR to the base URL of the server where you serve the mirror tree
# produced by ./mirror-pull.sh (served by ./mirror-serve.sh or any web server).
#
# The mirror must expose the same layout the pull script creates, e.g.:
#   $BT_MIRROR/install/<type>/lib.sh
#   $BT_MIRROR/install/<type>/<name>.sh
#   $BT_MIRROR/install/src/<tarballs...>
#   $BT_MIRROR/install/pyenv_<arch>.tar.gz
#   $BT_MIRROR/pip/   (Python wheels, optional)
#
# Examples:
#   BT_MIRROR="http://10.0.0.5:5050"
#   BT_MIRROR="http://mirror.lan"
#   BT_MIRROR="https://files.example.com/aapanel"
# ==============================================================================
BT_MIRROR="http://127.0.0.1:5050"
